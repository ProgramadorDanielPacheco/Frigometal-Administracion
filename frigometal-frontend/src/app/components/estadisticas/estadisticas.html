<div style="padding: 40px; max-width: 1200px; margin: auto;">
  <div style="margin-bottom: 30px;">
    <h2 style="font-family: Roboto, sans-serif; font-weight: 400; color: #333; margin: 0;">Métricas de Rendimiento (KPIs)</h2>
    <p style="color: gray; margin-top: 5px;">Sistema de gestión para el año {{anioActual}}.</p>
  </div>

  <div style="display: flex; flex-direction: column; gap: 40px;">
    
    <mat-card style="width: 100%; padding: 25px; border-top: 5px solid #4caf50;">
      <h3 style="color: #2e7d32; margin-top: 0; font-size: 1.3rem;">Ingresos vs Egresos (Finanzas)</h3>
      
      <div style="display: flex; gap: 20px; background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
        
        <mat-form-field appearance="outline" style="flex: 1; min-width: 100px; margin-bottom: -1.25em;">
          <mat-label>Semana</mat-label>
          <input matInput type="number" min="1" max="52" [(ngModel)]="semanaIngresos" (ngModelChange)="buscarIngresosPorSemana()">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 180px; margin-bottom: -1.25em;">
          <mat-label>Meta ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.meta">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 180px; margin-bottom: -1.25em;">
          <mat-label>Ingresos ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.ingresos">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 180px; margin-bottom: -1.25em;">
          <mat-label>Egresos ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.egresos">
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="guardarIngresos()" style="height: 52px; flex: 1; min-width: 150px; font-weight: bold;">
          Guardar Sem. {{semanaIngresos}}
        </button>
      </div>

      <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="canvasIngresos"></canvas>
      </div>
    </mat-card>

    <mat-card style="width: 100%; padding: 25px; border-top: 5px solid #9c27b0;">
      <h3 style="color: #7b1fa2; margin-top: 0; font-size: 1.3rem;">Uso de Material (Productividad)</h3>
      
      <div style="display: flex; gap: 20px; background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
        
        <mat-form-field appearance="outline" style="flex: 1; min-width: 100px; margin-bottom: -1.25em;">
            <mat-label>Semana</mat-label>
            <input matInput type="number" min="1" max="52" [(ngModel)]="semanaProductividad" (ngModelChange)="buscarProductividadPorSemana()">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 3; min-width: 200px; margin-bottom: -1.25em;">
          <mat-label>Meta (Planchas de Acero)</mat-label>
          <input matInput type="number" [(ngModel)]="formProductividad.meta_planchas">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 3; min-width: 200px; margin-bottom: -1.25em;">
          <mat-label>Planchas Usadas Reales</mat-label>
          <input matInput type="number" [(ngModel)]="formProductividad.planchas_usadas">
        </mat-form-field>

        <button mat-raised-button color="accent" (click)="guardarProductividad()" style="height: 52px; flex: 2; min-width: 150px; font-weight: bold;">
          Guardar Sem. {{semanaProductividad}}
        </button>
      </div>

      <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="canvasProductividad"></canvas>
      </div>
    </mat-card>

    <mat-card style="width: 100%; padding: 25px; border-top: 5px solid #4caf50;">
      <h3 style="color: #2e7d32; margin-top: 0; font-size: 1.3rem;">Ventas</h3>
      
      <div style="display: flex; gap: 20px; background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
        
        <mat-form-field appearance="outline" style="flex: 1; min-width: 100px; margin-bottom: -1.25em;">
          <mat-label>Semana</mat-label>
          <input matInput type="number" min="1" max="52" [(ngModel)]="semanaVentas" (ngModelChange)="buscarVentasPorSemana()">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 200px; margin-bottom: -1.25em;">
          <mat-label>Meta ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formVentas.meta">
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 200px; margin-bottom: -1.25em;">
          <mat-label>Ingresos ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formVentas.ingresos">
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="guardarVentas()" style="height: 52px; flex: 1; min-width: 150px; font-weight: bold;">
          Guardar Sem. {{semanaVentas}}
        </button>
      </div>

      <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="canvasVentas"></canvas>
      </div>
    </mat-card>

  </div>
</div>

<div style="padding: 40px; max-width: 1200px; margin: auto;">
  <div style="margin-bottom: 30px;">
    <h2 style="font-family: Roboto, sans-serif; font-weight: 400; color: #333; margin: 0;">Métricas de Rendimiento (KPIs)</h2>
    <p style="color: gray; margin-top: 5px;">Nos encontramos en la <b>Semana {{semanaActual}}</b> del año {{anioActual}}.</p>
  </div>

  <div style="display: flex; gap: 30px; flex-wrap: wrap;">
    
    <mat-card style="flex: 1; min-width: 400px; padding: 20px; border-top: 5px solid #4caf50;">
      <h3 style="color: #2e7d32; margin-top: 0;">Ingresos vs Egresos (Finanzas)</h3>
      
      <div style="display: flex; gap: 10px; background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center;">
        <mat-form-field appearance="outline" style="width: 100px; margin-bottom: -1.25em;">
          <mat-label>Meta ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.meta">
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 110px; margin-bottom: -1.25em;">
          <mat-label>Ingresos ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.ingresos">
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 110px; margin-bottom: -1.25em;">
          <mat-label>Egresos ($)</mat-label>
          <input matInput type="number" [(ngModel)]="formIngresos.egresos">
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 80px; margin-bottom: -1.25em;">
            <mat-label>Semana</mat-label>
            <input matInput type="number" min="1" max="52" [(ngModel)]="semanaSeleccionada">
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="guardarIngresos()" style="height: 50px;">Guardar Sem. {{semanaSeleccionada}}</button>
      </div>

      <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="canvasIngresos"></canvas>
      </div>
    </mat-card>

    <mat-card style="flex: 1; min-width: 400px; padding: 20px; border-top: 5px solid #9c27b0;">
      <h3 style="color: #7b1fa2; margin-top: 0;">Uso de Material (Productividad)</h3>
      
      <div style="display: flex; gap: 10px; background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center;">
        <mat-form-field appearance="outline" style="width: 120px; margin-bottom: -1.25em;">
          <mat-label>Meta (Planchas)</mat-label>
          <input matInput type="number" [(ngModel)]="formProductividad.meta_planchas">
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 140px; margin-bottom: -1.25em;">
          <mat-label>Planchas Usadas</mat-label>
          <input matInput type="number" [(ngModel)]="formProductividad.planchas_usadas">
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 80px; margin-bottom: -1.25em;">
            <mat-label>Semana</mat-label>
            <input matInput type="number" min="1" max="52" [(ngModel)]="semanaSeleccionada">
        </mat-form-field>
        <button mat-raised-button color="accent" (click)="guardarProductividad()" style="height: 50px;">Guardar Sem. {{semanaSeleccionada}}</button>
      </div>

      <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="canvasProductividad"></canvas>
      </div>
    </mat-card>

  </div>
</div>
